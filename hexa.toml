# hexa.toml — hexa-cosmos standalone package manifest
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Distribution target: hx install hexa-cosmos
# Provenance: extracted 2026-05-06 from canon@c0f1f570
#             (domains/physics/{cosmology,cosmology-particle,cosmic-observatory})

[package]
name = "hexa-cosmos"
version = "1.0.0"
entry = "cli/hexa-cosmos.hexa"
description = "Cosmos substrate (HEXA family) — cosmology + particle-cosmology + cosmic observatory. n=6 LambdaCDM (ΛCDM) closed-form comparison candidate. 3-pillar architecture; .hexa CLI is a placeholder router (TBD wiring); n=6 invariant lattice (σ=12, τ=4, φ=2, J₂=24)."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/dancinlab/hexa-cosmos"
homepage = "https://github.com/dancinlab/hexa-cosmos"
readme = "README.md"
keywords = ["cosmology", "lambda-cdm", "particle-cosmology", "cosmic-observatory", "hexa-family", "n6-invariant"]
categories = ["cosmology", "astrophysics", "particle-physics"]

[lib]
entry = "cosmology/cosmology.md"

[[bin]]
name = "hexa-cosmos"
path = "cli/hexa-cosmos.hexa"

[test]
runner = "hexa"
files = [
    "tests/test_selftest.hexa",
]

# ── hx install hook ───────────────────────────────────────
[scripts]
install = "install.hexa"

# ── Modules manifest (3 pillars + selftest placeholder) ───
# cosmology/    — cosmology spec (markdown source-of-truth)
# particle/     — particle-cosmology spec (markdown source-of-truth)
# observatory/  — cosmic-observatory spec (markdown source-of-truth)
[modules]
hexa = [
    "cosmology/cosmology.md",
    "particle/cosmology-particle.md",
    "observatory/cosmic-observatory.md",
]

# ── Dependencies ───────────────────────────────────────────
[dependencies]
hexa-lang = ">=1.0.0"

# ── Closure provenance (raw#10 honest C3) ─────────────────
# v1.0.0 closure: 0/3 pillars empirically wired. All 3 ship as theoretical
# specs + candidate closed-form ΛCDM comparison. .hexa CLI is a placeholder
# router (subcmd dispatch landed; numerical impls TBD).
[closure]
pillars_total = 3
pillars_wired = 0
pillars_spec = 3
verdict = "SPEC_ONLY"
extracted_from = "canon@c0f1f570 (2026-05-06)"

# ── Scope honesty (raw#10 C3) ─────────────────────────────
[scope]
honest_scope = "COSMOLOGY + PARTICLE + OBSERVATORY: theoretical + candidate closed-form spec only. n=6 ΛCDM closed-form comparison is a CANDIDATE, not a measurement."
not_scope = ["empirical CMB pipeline (no Planck/SH0ES data ingest)", "N-body simulator (no Uchuu/IllustrisTNG bridge)", "telescope control (observatory pillar = spec only)"]
n6_lattice_caveat = "n=6 invariant (σ(6)=12, τ(6)=4, φ(6)=2, J₂=24) cross-derived via OEIS A000203/A000005/A001414. ΛCDM 6-parameter alignment (Ω_b·h², Ω_c·h², 100θ_MC, τ_reion, n_s, ln(10¹⁰A_s)) is a candidate closed-form mapping; not a measurement."

# ── Cost profile ──────────────────────────────────────────
[cost]
mac_local_default = "$0 (pure markdown spec + placeholder CLI router)"
